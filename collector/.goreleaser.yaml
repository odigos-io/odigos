version: 2
project_name: odigos-otelcol

before:
  hooks:
    - go mod tidy -C odigosotelcol
    # Stamp the release version (e.g. v1.22.4, from the otelcol-linux/vX.Y.Z tag)
    # into a file packaged at /etc/odigos-otelcol/VERSION. The vm-agent reads this
    # to display the collector's release version instead of the upstream core
    # version baked into the binary's build info.
    - sh -c 'printf "%s\n" "{{ .Tag }}" > distribution/odigos-otelcol/VERSION'

builds:
  - id: odigos-otelcol-linux
    env: [CGO_ENABLED=0]
    dir: odigosotelcol
    main: .
    binary: odigos-otelcol
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -checklinkname=0

nfpms:
  - id: packages
    package_name: odigos-otelcol
    vendor: Odigos Inc.
    maintainer: Odigos Inc.
    homepage: https://odigos.io
    description: Instant distributed tracing without code changes using eBPF
    formats:
      - deb
      - rpm
    file_name_template: "{{ .ConventionalFileName }}"
    contents:
      - src: distribution/odigos-otelcol/odigos-otelcol.service
        dst: /usr/lib/systemd/system/odigos-otelcol.service

      - src: distribution/odigos-otelcol/odigos-otelcol-config.service
        dst: /usr/lib/systemd/system/odigos-otelcol-config.service

      - src: distribution/odigos-otelcol/odigos-otelcol-config.path
        dst: /usr/lib/systemd/system/odigos-otelcol-config.path

      - src: distribution/odigos-otelcol/odigos-otelcol.conf
        dst: /etc/odigos-otelcol/odigos-otelcol.conf
        type: config|noreplace

      - src: distribution/odigos-otelcol/config.yaml
        dst: /etc/odigos-otelcol/config.yaml
        type: config|noreplace

      # Release-version stamp (generated by the before-hook above). Regular file,
      # NOT config|noreplace, so every upgrade overwrites it with the new version
      # and uninstall removes it.
      - src: distribution/odigos-otelcol/VERSION
        dst: /etc/odigos-otelcol/VERSION

    scripts:
      preinstall: distribution/odigos-otelcol/preinstall.sh
      postinstall: distribution/odigos-otelcol/postinstall.sh
      preremove: distribution/odigos-otelcol/preremove.sh

release:
  disable: true
