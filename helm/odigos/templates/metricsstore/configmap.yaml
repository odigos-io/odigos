{{- $metricsStoreDisabled := false }}
{{- if .Values.ownTelemetry }}
  {{- if .Values.ownTelemetry.metricsStore }}
    {{- if hasKey .Values.ownTelemetry.metricsStore "disabled" }}
      {{- $metricsStoreDisabled = .Values.ownTelemetry.metricsStore.disabled }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if not $metricsStoreDisabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: odigos-victoriametrics-config
  namespace: {{ .Release.Namespace }}
data:
  scrape.yml: |
    scrape_configs:
    - job_name: self
      static_configs:
      - targets: ['localhost:8428']
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '(.*tsdb.*)'
          action: keep
{{- end }}
