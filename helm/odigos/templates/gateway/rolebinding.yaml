apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- include "odigos.ownerReferences" . | nindent 2 }}
  name: odigos-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: odigos-gateway
subjects:
- kind: ServiceAccount
  name: odigos-gateway