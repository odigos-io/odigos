{{- if .Values.reactor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: odigos-reactor
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: odigos-reactor
spec:
  selector:
    app.kubernetes.io/name: odigos-reactor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
