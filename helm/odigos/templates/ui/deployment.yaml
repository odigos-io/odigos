apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: odigos-ui
    odigos.io/system-object: "true"
  name: {{ .Values.ui.deploymentName | default "odigos-ui" }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odigos-ui
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: ui
      labels:
        app: odigos-ui
    spec:
      {{- if .Values.ui.nodeSelector }}
      # Component-specific nodeSelector (overrides global values.yaml nodeSelector)
      nodeSelector:
      {{- toYaml .Values.ui.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      # Global nodeSelector from values.yaml
      nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range .Values.topologySpreadConstraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: odigos-ui
        {{- end }}
      {{- end }}
      {{- if .Values.ui.priorityClassName }}
      priorityClassName: {{ .Values.ui.priorityClassName }}
      {{- end }}
      containers:
      - name: ui
        {{- $imageTag := .Values.image.tag | default .Chart.AppVersion }}
        {{- $isEnterprise := not (empty (include "odigos.secretExists" .)) }}
        {{- $uiComponent := ternary "enterprise-ui" "ui" $isEnterprise }}
        image: {{ template "utils.imageName" (dict "Values" .Values "Component" $uiComponent "Tag" $imageTag) }}
        args:
          - --namespace=$(CURRENT_NS)
          - --address=0.0.0.0
        env:
          - name: CURRENT_NS
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: ODIGOS_LOG_LEVEL
            value: {{ .Values.ui.logLevel | default .Values.logLevel | default "info" | quote }}
          {{- if .Values.ui.centralBackendURL }}
          - name: CENTRAL_BACKEND_WS_URL
            valueFrom:
              configMapKeyRef:
                name: odigos-configuration
                key: centralBackendURL
          {{- end }}
          - name: GOMEMLIMIT
            value: {{ include "odigos.gomemlimitFromResources" (dict "Resources" .Values.ui.resources) }}
          {{- if .Values.profiling.enabled }}
          {{- $pui := .Values.profiling.ui | default dict }}
          # Profile-store cache tuning. The UI reads these env vars (frontend/services/profiles
          # StoreLimitsFromEnv); without them it falls back to hardcoded code defaults and the
          # profiling.ui helm values would be silently ignored. Keep maxSlots*slotMaxBytes below
          # the UI memory limit (worst-case in-memory cache ceiling).
          - name: PROFILES_MAX_SLOTS
            value: {{ $pui.maxSlots | default 32 | int | quote }}
          - name: PROFILES_SLOT_TTL_SECONDS
            value: {{ $pui.slotTTLSeconds | default 300 | int | quote }}
          - name: PROFILES_SLOT_DATA_RETENTION_SECONDS
            value: {{ $pui.dataRetentionSeconds | default 1800 | int | quote }}
          - name: PROFILES_SLOT_MAX_BYTES
            value: {{ $pui.slotMaxBytes | default 10485760 | int | quote }}
          {{- end }}
          {{- if $isEnterprise }}
          # Consumed by the enterprise UI at startup; ignored by the community image.
          - name: ODIGOS_ONPREM_TOKEN
            valueFrom:
              secretKeyRef:
                name: odigos-pro
                key: odigos-onprem-token
          {{- end }}
        ports:
          - containerPort: 3000
            name: ui
          - containerPort: 4317
            name: otlp-grpc
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
{{ toYaml .Values.ui.resources | indent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
          - name: ui-db-storage
            mountPath: /data
      securityContext:
        runAsNonRoot: true
      serviceAccountName: odigos-ui
      terminationGracePeriodSeconds: 10
      volumes:
        - name: ui-db-storage
          emptyDir:
            sizeLimit: 50Mi
      {{ include "odigos.renderPullSecrets" . | nindent 6 }}
{{- with .Values.ui }}
  {{- if .tolerations }}
      tolerations: {{ toYaml .tolerations | nindent 8 }}
  {{- end }}
  {{- if .affinity }}
      affinity: {{ toYaml .affinity | nindent 8 }}
  {{- end }}
{{- end }}
