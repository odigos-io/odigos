{{ if .Values.gke.enabled }}
apiVersion: v1
kind: ResourceQuota
metadata:
  {{- include "odigos.ownerReferences" . | nindent 2 }}
  name: odigos-quota
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
spec:
  hard:
    pods: "10k"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values:
          - system-node-critical
{{- end }}
