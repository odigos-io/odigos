{{- if and .Values.security.enabled (include "odigos.secretExists" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odigos-security
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: odigos-security
    odigos.io/system-object: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odigos-security
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odigos-security
    spec:
      serviceAccountName: odigos-security
      {{- if .Values.security.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.security.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.security.priorityClassName }}
      priorityClassName: {{ .Values.security.priorityClassName }}
      {{- end }}
      {{ include "odigos.renderPullSecrets" . | nindent 6 }}
      containers:
        - name: odigos-security
          {{ $imageTag := .Values.image.tag | default .Chart.AppVersion }}
          image: {{ template "utils.imageName" (dict "Values" .Values "Component" "enterprise-security" "Tag" $imageTag) }}
          ports:
            - name: http
              containerPort: 8080
            - name: otlp-grpc
              containerPort: 4317
            - name: pprof
              containerPort: 6060
          env:
            - name: CURRENT_NS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ODIGOS_ONPREM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: odigos-pro
                  key: odigos-onprem-token
            - name: GOMEMLIMIT
              value: {{ include "odigos.gomemlimitFromResources" (dict "Resources" .Values.security.resources) }}
            # Postgres password comes from the bundled secret; user and
            # database name are hardcoded ("odigos_security") in the
            # Postgres Deployment too, so we just bake them into the DSN.
            # randAlphaNum (used to mint the password) only produces
            # URL-safe chars, so no encoding gymnastics are needed here.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odigos-security-postgres
                  key: password
            - name: POSTGRES_DSN
              value: "postgres://odigos_security:$(POSTGRES_PASSWORD)@odigos-security-postgres:5432/odigos_security?sslmode=disable"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.security.resources.requests.cpu }}
              memory: {{ .Values.security.resources.requests.memory }}
            limits:
              cpu: {{ .Values.security.resources.limits.cpu }}
              memory: {{ .Values.security.resources.limits.memory }}
      {{- with .Values.security.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.security.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
