{{- if and .Values.security.enabled (include "odigos.secretExists" .) }}
{{- /*
Password lifecycle:
  - First install: generate a 24-char random password and store it here.
  - Subsequent upgrades: lookup the existing Secret and reuse its password,
    so `helm upgrade` doesn't rotate the credential out from under a running
    ClickHouse pod.
  - `helm template` (no cluster): lookup returns empty, so a new password is
    rendered each call. That is OK for offline rendering / testing.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "odigos-security-clickhouse" }}
{{- $password := "" }}
{{- if and $existing $existing.data $existing.data.password }}
{{- $password = $existing.data.password | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: odigos-security-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: odigos-security-clickhouse
    odigos.io/system-object: "true"
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
