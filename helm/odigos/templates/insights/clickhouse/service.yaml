{{- if and .Values.insights.enabled (include "odigos.secretExists" .) }}
apiVersion: v1
kind: Service
metadata:
  name: odigos-insights-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: odigos-insights-clickhouse
    odigos.io/system-object: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: odigos-insights-clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
{{- end }}
