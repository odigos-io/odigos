---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  labels:
    odigos.io/system-object: "true"
  name: actions.odigos.io
spec:
  group: odigos.io
  names:
    kind: Action
    listKind: ActionList
    plural: actions
    singular: action
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              actionName:
                description: Allows you to attach a meaningful name to the action
                  for convenience. Odigos does not use or assume any meaning from
                  this field.
                type: string
              addClusterInfo:
                description: AddClusterInfo is the config for the AddClusterInfo Action.
                properties:
                  clusterAttributes:
                    items:
                      properties:
                        attributeName:
                          description: the name of the attribute to insert
                          type: string
                        attributeStringValue:
                          description: |-
                            if the value is a string, this field should be used.
                            empty string is a valid value
                          type: string
                      required:
                      - attributeName
                      - attributeStringValue
                      type: object
                    type: array
                  overwriteExistingValues:
                    type: boolean
                required:
                - clusterAttributes
                type: object
              dbQueryTemplatization:
                description: DbQueryTemplatization is the config for the DbQueryTemplatization
                  Action.
                properties:
                  scopes:
                    description: |-
                      the scope of services for which this templatization config will be applied.
                      if empty, the provided config will be applied to all sources.
                    properties:
                      languages:
                        items:
                          enum:
                          - java
                          - python
                          - go
                          - dotnet
                          - javascript
                          - php
                          - ruby
                          - rust
                          - cplusplus
                          - mysql
                          - nginx
                          - redis
                          - postgres
                          - unknown
                          - ignored
                          - '*'
                          type: string
                        type: array
                      namespaces:
                        items:
                          type: string
                        type: array
                      sources:
                        items:
                          description: |-
                            PodWorkload represents the higher-level controller managing a specific Pod within a Kubernetes cluster.
                            It contains essential details about the controller such as its Name, Namespace, and Kind.
                            'Kind' refers to the type of controller, which can be a Deployment, StatefulSet, or DaemonSet.
                            This struct is useful for identifying and interacting with the overarching entity
                            that governs the lifecycle and behavior of a Pod, especially in contexts where
                            understanding the relationship between a Pod and its controlling workload is crucial.
                          properties:
                            kind:
                              description: |-
                                1. the pascal case representation of the workload kind
                                it is used in k8s api objects as the `Kind` field.
                              type: string
                            name:
                              type: string
                            namespace:
                              type: string
                          required:
                          - kind
                          - name
                          - namespace
                          type: object
                        type: array
                    type: object
                  templatizeLiterals:
                    description: |-
                      TemplatizeLiterals replaces number and string literals in SQL queries with placeholders
                      (e.g. "SELECT * FROM users WHERE id = 1" -> "SELECT * FROM users WHERE id = ?").

                      what is templatized:
                      - number literals
                      - string literals
                      what is not templatized:
                      - identifiers (e.g. table names, column names, etc.)
                      - positional parameters (e.g. "SELECT * FROM users WHERE id = $1")
                      - bind parameters (e.g. "SELECT * FROM users WHERE id = :name")
                      - boolean literals
                      - NULL
                      - keywords, operators, punctuation, whitespace, comments, etc.
                    type: boolean
                type: object
              deleteAttribute:
                description: DeleteAttribute is the config for the DeleteAttribute
                  Action.
                properties:
                  attributeNamesToDelete:
                    items:
                      type: string
                    type: array
                required:
                - attributeNamesToDelete
                type: object
              disabled:
                description: A boolean field allowing to temporarily disable the action,
                  but keep it around for future use
                type: boolean
              extractAttribute:
                description: ExtractAttribute is the config for the ExtractAttribute
                  Action.
                properties:
                  extractions:
                    description: Extractions is the list of extraction rules to apply,
                      in order.
                    items:
                      description: |-
                        Extraction describes a single extraction rule applied by the
                        odigosextractattribute processor. Either (LookupKey + DataFormat) or
                        Regex must be provided; the captured value is written to a new span
                        attribute named TargetAttributeName.
                      properties:
                        dataFormat:
                          description: |-
                            A pre-set definition which resolves into a regex (e.g. JSON DataFormat would give a regex that searches
                            inside a JSON string), which also applies LookupKey for searching inside it.
                            Required when using LookupKey.
                            You can input either LookupKey+DataFormat, or supply your own Regex.
                          enum:
                          - resource_path
                          - json
                          - sql
                          type: string
                        lookupKey:
                          description: |-
                            LookupKey is the literal key to search for inside the scanned span attributes.
                            It is plugged into the pre-set regex pattern selected by DataFormat (e.g. for JSON,
                            the processor will look for `"<lookupKey>": "<value>"` and capture the value).
                            Required when using DataFormat.
                            You can input either LookupKey+DataFormat, or supply your own Regex.
                          type: string
                        regex:
                          description: |-
                            Regex is a custom regular expression with a single capture group whose value is
                            written to the new span attribute named TargetAttributeName.
                            You can input either Regex, or LookupKey+DataFormat.
                          type: string
                        targetAttributeName:
                          description: TargetAttributeName is the name of the new
                            span attribute the extracted value will be written to.
                          type: string
                      required:
                      - targetAttributeName
                      type: object
                    minItems: 1
                    type: array
                required:
                - extractions
                type: object
              inferDbAttributes:
                description: InferDbAttributes is the config for the InferDbAttributes
                  Action.
                properties:
                  scopes:
                    description: |-
                      the scope of services for which this config will be applied.
                      if empty, the provided config will be applied to all sources.
                    properties:
                      languages:
                        items:
                          enum:
                          - java
                          - python
                          - go
                          - dotnet
                          - javascript
                          - php
                          - ruby
                          - rust
                          - cplusplus
                          - mysql
                          - nginx
                          - redis
                          - postgres
                          - unknown
                          - ignored
                          - '*'
                          type: string
                        type: array
                      namespaces:
                        items:
                          type: string
                        type: array
                      sources:
                        items:
                          description: |-
                            PodWorkload represents the higher-level controller managing a specific Pod within a Kubernetes cluster.
                            It contains essential details about the controller such as its Name, Namespace, and Kind.
                            'Kind' refers to the type of controller, which can be a Deployment, StatefulSet, or DaemonSet.
                            This struct is useful for identifying and interacting with the overarching entity
                            that governs the lifecycle and behavior of a Pod, especially in contexts where
                            understanding the relationship between a Pod and its controlling workload is crucial.
                          properties:
                            kind:
                              description: |-
                                1. the pascal case representation of the workload kind
                                it is used in k8s api objects as the `Kind` field.
                              type: string
                            name:
                              type: string
                            namespace:
                              type: string
                          required:
                          - kind
                          - name
                          - namespace
                          type: object
                        type: array
                    type: object
                type: object
              k8sAttributes:
                description: K8sAttributes is the config for the K8sAttributes Action.
                properties:
                  annotationsAttributes:
                    description: list of annotations to be extracted from the pod,
                      and the attribute key to be used for the resource attribute
                      created from each annotation.
                    items:
                      properties:
                        annotationKey:
                          description: |-
                            The annotation name to be extracted.
                            e.g. "kubectl.kubernetes.io/restartedAt"
                          type: string
                        attributeKey:
                          description: |-
                            The attribute key to be used for the resource attribute created from the annotation.
                            e.g. "kubectl.kubernetes.restartedAt"
                          type: string
                        from:
                          default: pod
                          description: |-
                            The source of the annotation.
                            e.g. "pod" or "namespace"
                            Deprecated: Use FromSources instead for specifying multiple sources with precedence.
                          type: string
                        fromSources:
                          description: |-
                            The sources from which to extract the annotation, in order of precedence (most specific first).
                            When multiple sources are specified, the most specific source (e.g., pod) takes precedence
                            over less specific sources (e.g., namespace).
                            If an annotation exists in multiple sources, the value from the most specific source will be used.
                            Supported sources: "pod", "namespace", "node"
                          items:
                            enum:
                            - pod
                            - namespace
                            - node
                            type: string
                          type: array
                      required:
                      - annotationKey
                      - attributeKey
                      type: object
                    type: array
                  collectClusterUID:
                    description: Collect the k8s.cluster.uid attribute, which is set
                      to the uid of the namespace "kube-system"
                    type: boolean
                  collectContainerAttributes:
                    description: |-
                      Collect the following container related attributes:
                      k8s.container.name
                      container.id
                      container.image.name
                      container.image.tag
                    type: boolean
                  collectReplicaSetAttributes:
                    description: |-
                      collect replicaset related attributes (when relevant, e.g. for deployments):
                      k8s.replicaset.name
                      if CollectWorkloadUID is set, also collect:
                      k8s.replicaset.uid
                      DEPRECATED: ReplicaSet attributes are now collected by default during instrumentation.
                    type: boolean
                  collectWorkloadUID:
                    description: |-
                      Collect the following workload UID attributes:
                      k8s.deployment.uid
                      k8s.daemonset.uid
                      k8s.statefulset.uid
                      DEPRECATED: Workload UID attributes are now collected by default during instrumentation.
                    type: boolean
                  labelsAttributes:
                    description: list of labels to be extracted from the pod, and
                      the attribute key to be used for the resource attribute created
                      from each label.
                    items:
                      properties:
                        attributeKey:
                          description: |-
                            The attribute key to be used for the resource attribute created from the label.
                            e.g. "app.kubernetes.name"
                          type: string
                        from:
                          default: pod
                          description: |-
                            The source of the label.
                            e.g. "pod" or "namespace"
                            Deprecated: Use FromSources instead for specifying multiple sources with precedence.
                          enum:
                          - pod
                          - namespace
                          - node
                          type: string
                        fromSources:
                          description: |-
                            The sources from which to extract the label, in order of precedence (most specific first).
                            When multiple sources are specified, the most specific source (e.g., pod) takes precedence
                            over less specific sources (e.g., namespace).
                            If a label exists in multiple sources, the value from the most specific source will be used.
                            Supported sources: "pod", "namespace", "node"
                          items:
                            enum:
                            - pod
                            - namespace
                            - node
                            type: string
                          type: array
                        labelKey:
                          description: |-
                            The label name to be extracted.
                            e.g. "app.kubernetes.io/name"
                          type: string
                      required:
                      - attributeKey
                      - labelKey
                      type: object
                    type: array
                type: object
              notes:
                description: 'A free-form text field that allows you to attach notes
                  regarding the action for convenience. For example: why it was added.
                  Odigos does not use or assume any meaning from this field.'
                type: string
              piiMasking:
                description: PiiMasking is the config for the PiiMasking Action.
                properties:
                  piiCategories:
                    items:
                      enum:
                      - CREDIT_CARD
                      - EMAIL
                      - JWT
                      - UUID
                      type: string
                    type: array
                required:
                - piiCategories
                type: object
              renameAttribute:
                description: RenameAttribute is the config for the RenameAttribute
                  Action.
                properties:
                  renames:
                    additionalProperties:
                      type: string
                    type: object
                required:
                - renames
                type: object
              signals:
                description: Which signals should this action operate on.
                items:
                  enum:
                  - LOGS
                  - TRACES
                  - METRICS
                  - PROFILES
                  type: string
                type: array
              spanRenamer:
                description: SpanRenamer is the config for the SpanRenamer Action.
                properties:
                  programmingLanguage:
                    description: the programming language which the renamed spans
                      are written in.
                    enum:
                    - java
                    - python
                    - go
                    - dotnet
                    - javascript
                    - php
                    - ruby
                    - rust
                    - cplusplus
                    - mysql
                    - nginx
                    - redis
                    - postgres
                    - unknown
                    - ignored
                    - '*'
                    type: string
                  regexReplacements:
                    description: |-
                      list of regex replacements to be applied to the span name.
                      all options are always tried, regardless of whether the previous options have matched or not.
                    items:
                      description: configuration for replacing parts of the span name
                        with a template text based on regular expressions.
                      properties:
                        regexPattern:
                          description: regular expression that will be used to match
                            the part of the span name to be replaced.
                          type: string
                        templateText:
                          description: the text to be used for replacing the matched
                            part of the span name.
                          type: string
                      required:
                      - regexPattern
                      - templateText
                      type: object
                    type: array
                  scopeName:
                    description: the name of the opentelemetry intrumentation scope
                      which is producing the spans to be renamed.
                    type: string
                required:
                - programmingLanguage
                - scopeName
                type: object
              urlTemplatization:
                description: URLTemplatization is the config for the URLTemplatization
                  Action.
                properties:
                  default:
                    description: |-
                      configurations for default templatization, on groups of services.
                      default templatization is applied on a single http span if none of the custom templatization rules matched.
                    items:
                      description: URLTemplatizationDefaultTemplatizationGroup is
                        a group of services for which default templatization will
                        be applied.
                      properties:
                        disabled:
                          description: |-
                            if set to true, the default templatization will be disabled for the services in the scope.
                            in case of conflict (if other action set this to false), the default templatization will be disabled.
                          type: boolean
                        scopes:
                          description: |-
                            the scope of services for which this templatization config will be applied.
                            if empty, the provided config will be applied to all sources.
                          properties:
                            languages:
                              items:
                                enum:
                                - java
                                - python
                                - go
                                - dotnet
                                - javascript
                                - php
                                - ruby
                                - rust
                                - cplusplus
                                - mysql
                                - nginx
                                - redis
                                - postgres
                                - unknown
                                - ignored
                                - '*'
                                type: string
                              type: array
                            namespaces:
                              items:
                                type: string
                              type: array
                            sources:
                              items:
                                description: |-
                                  PodWorkload represents the higher-level controller managing a specific Pod within a Kubernetes cluster.
                                  It contains essential details about the controller such as its Name, Namespace, and Kind.
                                  'Kind' refers to the type of controller, which can be a Deployment, StatefulSet, or DaemonSet.
                                  This struct is useful for identifying and interacting with the overarching entity
                                  that governs the lifecycle and behavior of a Pod, especially in contexts where
                                  understanding the relationship between a Pod and its controlling workload is crucial.
                                properties:
                                  kind:
                                    description: |-
                                      1. the pascal case representation of the workload kind
                                      it is used in k8s api objects as the `Kind` field.
                                    type: string
                                  name:
                                    type: string
                                  namespace:
                                    type: string
                                required:
                                - kind
                                - name
                                - namespace
                                type: object
                              type: array
                          type: object
                        skipPolicy:
                          description: |-
                            config if default templatization should be skipped on error.
                            use it when sources scope describes a service that is publicly accessible to the internet
                            to filter garbage requests that can contaminate the url-templatization process.
                          properties:
                            skipForNonSuccessCodes:
                              description: |-
                                If set to true, default templatization will be skipped for any non-success HTTP status code (i.e., any code not in the 2xx range).
                                When this is true, the StatusCodes list is ignored.
                              type: boolean
                            skipHttpStatusCodes:
                              description: |-
                                the http status codes for which the default templatization will be skipped.
                                for example: [404, 401].
                                advanced users can use to cherry pick specific codes for tailoring to specific use cases.
                              items:
                                type: integer
                              type: array
                          type: object
                      type: object
                    type: array
                  rules:
                    description: |-
                      list here all the groups of rules that will be applied to the spans.
                      each group targets a specific set of spans that share the same filters.
                      for example, one can set up 3 groups in the action:
                      1. some rules for java spans
                      2. some rules for deployment foo in namespace default
                      3. rules without filters that will be applied to all spans.
                    items:
                      description: |-
                        UrlTemplatizationRule is a group of rules that share the same target spans.
                        If SourcesScope is empty, the rules apply to all sources (global).
                        If set, rules apply to selected scope.
                      properties:
                        scopes:
                          description: |-
                            SourcesScope selects which sources (workloads / containers / languages) the rules apply to.
                            Empty list means "all sources" (global rules).
                          properties:
                            languages:
                              items:
                                enum:
                                - java
                                - python
                                - go
                                - dotnet
                                - javascript
                                - php
                                - ruby
                                - rust
                                - cplusplus
                                - mysql
                                - nginx
                                - redis
                                - postgres
                                - unknown
                                - ignored
                                - '*'
                                type: string
                              type: array
                            namespaces:
                              items:
                                type: string
                              type: array
                            sources:
                              items:
                                description: |-
                                  PodWorkload represents the higher-level controller managing a specific Pod within a Kubernetes cluster.
                                  It contains essential details about the controller such as its Name, Namespace, and Kind.
                                  'Kind' refers to the type of controller, which can be a Deployment, StatefulSet, or DaemonSet.
                                  This struct is useful for identifying and interacting with the overarching entity
                                  that governs the lifecycle and behavior of a Pod, especially in contexts where
                                  understanding the relationship between a Pod and its controlling workload is crucial.
                                properties:
                                  kind:
                                    description: |-
                                      1. the pascal case representation of the workload kind
                                      it is used in k8s api objects as the `Kind` field.
                                    type: string
                                  name:
                                    type: string
                                  namespace:
                                    type: string
                                required:
                                - kind
                                - name
                                - namespace
                                type: object
                              type: array
                          type: object
                        templates:
                          description: the rules that will be applied to the spans
                            matching the above filters.
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                type: object
            required:
            - signals
            type: object
          status:
            properties:
              conditions:
                description: |-
                  Represents the observations of a action's current state.
                  Known .status.conditions.type are: "Available", "Progressing"
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
