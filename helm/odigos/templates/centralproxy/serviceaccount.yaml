{{- if and .Values.centralProxy.centralBackendURL .Values.clusterName (include "odigos.secretExists" .)}}
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- include "odigos.ownerReferences" . | nindent 2 }}
  name: central-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
{{- end }}
