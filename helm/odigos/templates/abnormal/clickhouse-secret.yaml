{{- if eq (include "abnormal.clickhouse.enabled" .) "true" }}
{{- if not .Values.abnormal.clickhouse.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: odigos-clickhouse-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "abnormal.clickhouse.labels" . | nindent 4 }}
  annotations:
    # Keep the generated password across helm upgrades.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ include "abnormal.clickhouse.password" . | quote }}
{{- end }}
{{- end }}
