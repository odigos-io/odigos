{{- if eq (include "abnormal.clickhouse.enabled" .) "true" }}
{{- $ch := .Values.abnormal.clickhouse }}
{{- if $ch.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odigos-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "abnormal.clickhouse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "abnormal.clickhouse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Clients and Prometheus within the Odigos namespace.
    - from:
        - podSelector: {}
      ports:
        - port: http
          protocol: TCP
        - port: tcp
          protocol: TCP
        {{- if $ch.metrics.enabled }}
        - port: metrics
          protocol: TCP
        {{- end }}
    {{- if gt (int $ch.replicaCount) 1 }}
    # Inter-node replication traffic between ClickHouse pods.
    - from:
        - podSelector:
            matchLabels:
              {{- include "abnormal.clickhouse.selectorLabels" . | nindent 14 }}
      ports:
        - port: interserver
          protocol: TCP
    {{- end }}
{{- end }}
{{- end }}
