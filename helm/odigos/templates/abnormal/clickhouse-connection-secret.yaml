{{- if eq (include "abnormal.clickhouse.enabled" .) "true" }}
{{- $ch := .Values.abnormal.clickhouse }}
{{- $user := $ch.auth.username | default "default" }}
{{- $host := include "abnormal.clickhouse.host" . }}
{{- $chartOwns := eq (include "abnormal.clickhouse.chartOwnsPassword" .) "true" }}
# Stable connection contract for consumers (e.g. the Odigos Abnormal security service).
# Consume with `envFrom: [{ secretRef: { name: odigos-clickhouse-connection } }]`.
# When the chart owns the password (default), CLICKHOUSE_PASSWORD and CLICKHOUSE_DSN are
# included here too. When auth.existingSecret is set, the consumer must additionally read
# the password from that Secret (it is intentionally NOT copied, to stay GitOps-safe).
apiVersion: v1
kind: Secret
metadata:
  name: odigos-clickhouse-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "abnormal.clickhouse.labels" . | nindent 4 }}
  annotations:
    # Preserve the generated password across helm upgrades.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  CLICKHOUSE_HOST: {{ $host | quote }}
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_HTTP_PORT: "8123"
  CLICKHOUSE_USERNAME: {{ $user | quote }}
  {{- if $chartOwns }}
  {{- $pw := include "abnormal.clickhouse.resolvedPassword" . }}
  CLICKHOUSE_PASSWORD: {{ $pw | quote }}
  # Native-protocol DSN. Assumes a URL-safe password (generated passwords are alphanumeric).
  CLICKHOUSE_DSN: {{ printf "clickhouse://%s:%s@%s:9000/default" $user $pw $host | quote }}
  {{- end }}
{{- end }}
