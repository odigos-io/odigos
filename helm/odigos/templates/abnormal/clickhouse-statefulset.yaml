{{- if eq (include "abnormal.clickhouse.enabled" .) "true" }}
{{- $ch := .Values.abnormal.clickhouse }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: odigos-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "abnormal.clickhouse.labels" . | nindent 4 }}
spec:
  serviceName: odigos-clickhouse-headless
  replicas: {{ $ch.replicaCount | default 1 }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "abnormal.clickhouse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "abnormal.clickhouse.labels" . | nindent 8 }}
      annotations:
        # Roll the pods when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/abnormal/clickhouse-configmap.yaml") . | sha256sum }}
    spec:
      {{- if $ch.nodeSelector }}
      nodeSelector:
        {{- toYaml $ch.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- with $ch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $ch.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      {{- include "odigos.renderPullSecrets" . | nindent 6 }}
      containers:
        - name: clickhouse
          image: {{ include "abnormal.clickhouse.image" . }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: tcp
              containerPort: 9000
              protocol: TCP
            {{- if gt (int $ch.replicaCount) 1 }}
            - name: interserver
              containerPort: 9009
              protocol: TCP
            {{- end }}
            {{- if $ch.metrics.enabled }}
            - name: metrics
              containerPort: 9363
              protocol: TCP
            {{- end }}
          env:
            - name: ODIGOS_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "abnormal.clickhouse.passwordSecretName" . }}
                  key: {{ include "abnormal.clickhouse.passwordSecretKey" . }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/odigos-config.xml
              subPath: config.xml
              readOnly: true
            - name: config
              mountPath: /etc/clickhouse-server/users.d/odigos-users.xml
              subPath: users.xml
              readOnly: true
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml $ch.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: odigos-clickhouse-config
            items:
              - key: config.xml
                path: config.xml
              - key: users.xml
                path: users.xml
        {{- if not $ch.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if $ch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "abnormal.clickhouse.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if $ch.persistence.storageClass }}
        storageClassName: {{ $ch.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $ch.persistence.size | quote }}
  {{- end }}
{{- end }}
