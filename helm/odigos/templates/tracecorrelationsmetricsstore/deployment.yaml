{{- if include "traceCorrelations.serviceIO.enabled" . | eq "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odigos-correlations-metrics
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odigos-correlations-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odigos-correlations-metrics
    spec:
      containers:
      - name: vm
        {{ $imageTag := .Values.image.tag | default .Chart.AppVersion }}
        image: {{ template "utils.imageName" (dict "Values" .Values "Component" "victoria-metrics" "Tag" $imageTag) }}
        args:
          - "-httpListenAddr=0.0.0.0:8428"
          - "-storageDataPath=/vm-data"
          - "-retentionPeriod=1d"

        ports:
        - name: http
          containerPort: 8428
        volumeMounts:
        - name: data
          mountPath: /vm-data
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 2Gi
      volumes:
      - name: data
        emptyDir: {}
{{- end }}
