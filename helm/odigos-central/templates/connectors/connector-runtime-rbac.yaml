{{- if (include "connectors.enabled" .) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connector-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: connector-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
rules:
  - apiGroups: ["odigos.io"]
    resources: ["odigoscloudconnectors"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["odigos.io"]
    resources: ["odigoscloudconnectors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["odigos.io"]
    resources: ["odigoscloudconnectors/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: connector-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
subjects:
  - kind: ServiceAccount
    name: connector-runtime
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: connector-runtime
{{- end }}
