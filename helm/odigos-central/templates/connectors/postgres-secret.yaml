{{- if (include "connectors.enabled" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: odigos-connector-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    odigos.io/system-object: "true"
type: Opaque
stringData:
  # Connection string consumed by the connector-runtime controller, connector pods and the migration Job.
  dsn: {{ include "connectors.postgresDSN" . | quote }}
  # Consumed by the PostgreSQL container itself.
  POSTGRES_USER: {{ .Values.cloudConnectors.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.cloudConnectors.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.cloudConnectors.postgres.database | quote }}
{{- end }}
