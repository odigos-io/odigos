apiVersion: internal.odigos.io/v1beta1
kind: Destination
metadata:
  type: pyroscope
  displayName: Pyroscope
  category: self hosted
spec:
  image: pyroscope.svg
  signals:
    traces:
      supported: false
    metrics:
      supported: false
    logs:
      supported: false
    profiles:
      supported: true
  fields:
    - name: PYROSCOPE_ENDPOINT
      displayName: Endpoint
      componentType: input
      componentProps:
        type: text
        required: true
        placeholder: 'pyroscope.pyroscope:4040'
        tooltip: 'Pyroscope OTLP/gRPC endpoint as host:port (default port 4040). Use host:port only — no http:// or path suffix.'
    - name: PYROSCOPE_TLS_ENABLED
      displayName: Enable TLS
      componentType: checkbox
      initialValue: false
      componentProps:
        required: false
        tooltip: 'Enable TLS for the OTLP gRPC connection to Pyroscope.'
      customReadDataLabels:
        - condition: 'true'
          title: 'TLS'
          value: 'Encrypted'
        - condition: 'false'
          title: 'TLS'
          value: 'Unencrypted'
    - name: PYROSCOPE_CA_PEM
      displayName: Certificate Authority
      componentType: textarea
      componentProps:
        required: false
        placeholder: '-----BEGIN CERTIFICATE-----'
        tooltip: 'CA certificate in PEM format to verify the Pyroscope server. Leave empty to use system root CA.'
      renderCondition: ['PYROSCOPE_TLS_ENABLED', '==', 'true']
      hideFromReadData: ['true']
    - name: PYROSCOPE_INSECURE_SKIP_VERIFY
      displayName: Insecure Skip Verify
      componentType: checkbox
      initialValue: false
      componentProps:
        required: false
        tooltip: 'Skip TLS certificate verification.'
      renderCondition: ['PYROSCOPE_TLS_ENABLED', '==', 'true']
  testConnectionSupported: false
