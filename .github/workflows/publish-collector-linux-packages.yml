name: Publish Collector Linux Packages

on:
  push:
    tags:
      - 'otelcol-linux/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. otelcol-linux/v1.2.3)'
        required: true

jobs:
  publish-collector-linux-packages:
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: depot-ubuntu-24.04-8
    steps:
      - name: Extract Tag
        id: extract_tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/*/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#otelcol-linux/}" >> $GITHUB_OUTPUT

      - name: Notify Slack Start
        if: always()
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "start releasing odigos collector as linux packages and docker image"
          failure-description: "error during releasing of odigos collector as linux packages and docker image"
          tag: ${{ steps.extract_tag.outputs.tag }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.extract_tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - id: gcp-auth
        name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          access_token_lifetime: 1200s

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Collector Docker Image
        uses: docker/build-push-action@v6
        with:
          push: true
          provenance: false
          tags: |
            us-central1-docker.pkg.dev/odigos-cloud/components/odigos-collector:${{ steps.extract_tag.outputs.version }}
            us-central1-docker.pkg.dev/odigos-cloud/components-private/odigos-collector:${{ steps.extract_tag.outputs.version }}
            keyval/odigos-collector:${{ steps.extract_tag.outputs.version }}
            ghcr.io/odigos-io/odigos-collector:${{ steps.extract_tag.outputs.version }}
          build-args: |
            SERVICE_NAME=collector
            ODIGOS_VERSION=${{ steps.extract_tag.outputs.version }}
            LD_FLAGS=-s -w
            RHEL=false
          platforms: linux/amd64,linux/arm64
          file: collector/Dockerfile

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Set GoReleaser tag
        run: |
          git config user.email "ci@odigos.io"
          git config user.name "Odigos CI"
          TAG="${{ steps.extract_tag.outputs.tag }}"
          SEMVER_TAG="${TAG#otelcol-linux/}"
          echo "GORELEASER_CURRENT_TAG=$SEMVER_TAG" >> $GITHUB_ENV
          git tag -a -f "$SEMVER_TAG" -m "Release $SEMVER_TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: collector

      - name: Upload Linux packages to Artifact Registry
        uses: odigos-io/ci-core/upload-linux-packages@v1.0.5
        with:
          gcp-project-id: ${{ secrets.GCP_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          package-directory: 'collector/dist'
          repository: odigos

      - name: Upload Linux Packages to AWS S3
        uses: odigos-io/ci-core/upload-to-s3@v1.0.6
        with:
          aws-role-arn: ${{ secrets.AWS_VM_AGENT_S3_ROLE }}
          aws-region: us-east-1
          bucket-name: odigos-releases
          agent-type: 'otelcol'
          version: ${{ steps.extract_tag.outputs.version }}
          package-directory: 'collector/dist'

      - name: Notify Slack Success
        if: always()
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "Odigos collector linux packages and docker image released successfully"
          failure-description: "ERROR: Odigos collector linux packages / docker image release failed"
          tag: ${{ steps.extract_tag.outputs.tag }}
