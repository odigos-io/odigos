name: Release Go Instrumentation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.21.0)"
        required: true
      phase:
        description: "Release phase to execute"
        required: true
        type: choice
        options:
          - update-version
          - create-tag

jobs:
  validate-input:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      version_no_prefix: ${{ steps.validate.outputs.version_no_prefix }}
    steps:
      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "Error: version must be in the format vX.Y.Z or vX.Y.Z-rcN"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_prefix=${VERSION#v}" >> $GITHUB_OUTPUT

  update-version:
    needs: validate-input
    if: ${{ github.event.inputs.phase == 'update-version' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate-input.outputs.version }}
      VERSION_NO_PREFIX: ${{ needs.validate-input.outputs.version_no_prefix }}
    steps:
      - name: Checkout enterprise-go-instrumentation
        uses: actions/checkout@v5
        with:
          repository: odigos-io/enterprise-go-instrumentation
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          fetch-depth: 0

      - name: Update version constants
        run: |
          if [ ! -f version.go ]; then
            echo "Error: version.go not found"
            exit 1
          fi

          sed -i 's/Version\s*=\s*"[^"]*"/Version = "'"${VERSION}"'"/' version.go

          echo "Updated version.go:"
          cat version.go

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          commit-message: 'Update distribution version to ${{ env.VERSION }}'
          branch: automated/update-version-${{ env.VERSION }}
          delete-branch: true
          title: 'Update distribution version to ${{ env.VERSION }}'
          body: |
            Automated version update for release ${{ env.VERSION }}.

            After merging, run the `Release Go Instrumentation` workflow again with phase `create-tag` and version `${{ env.VERSION }}` to tag the release.

      - name: Notify Slack
        if: always()
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "Created version update PR for enterprise-go-instrumentation ${{ env.VERSION }}"
          failure-description: "ERROR: Failed to create version update PR for enterprise-go-instrumentation ${{ env.VERSION }}"
          tag: ${{ env.VERSION }}

  create-tag:
    needs: validate-input
    if: ${{ github.event.inputs.phase == 'create-tag' }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate-input.outputs.version }}
    steps:
      - name: Checkout enterprise-go-instrumentation
        uses: actions/checkout@v5
        with:
          repository: odigos-io/enterprise-go-instrumentation
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          fetch-depth: 0

      - name: Verify version update was merged
        run: |
          if ! grep -q 'Version = "'"${VERSION}"'"' version.go; then
            echo "Error: version.go does not contain Version = \"${VERSION}\""
            echo "Make sure the version update PR has been merged before tagging."
            echo "Current version.go content:"
            cat version.go
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Error: tag ${VERSION} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"

          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

          echo "Successfully created and pushed tag ${VERSION}"

      - name: Notify Slack
        if: always()
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "Tagged enterprise-go-instrumentation ${VERSION}"
          failure-description: "ERROR: Failed to tag enterprise-go-instrumentation ${VERSION}"
          tag: ${{ env.VERSION }}
