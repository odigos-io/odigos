name: Update Instrumentation Agents Version

on:
  workflow_dispatch:
    inputs:
      instrumentation_agent:
        description: "Canonical agent category (e.g. python, php, ruby, nodejs)"
        required: true
        type: string
      new_agent_version:
        description: "Version of the agent to update (example: v0.11.0)"
        required: true
        type: string
  repository_dispatch:
    types:
      - update-instrumentation-agents-version

permissions: read-all

concurrency:
  group: agents-version-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-version-and-create-pr:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Resolve inputs
        id: in
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CAT="${{ github.event.inputs.instrumentation_agent }}"
            VER="${{ github.event.inputs.new_agent_version }}"
          else
            CAT="${{ github.event.client_payload.instrumentation_agent }}"
            VER="${{ github.event.client_payload.new_agent_version }}"
          fi
          if [ -z "$CAT" ] || [ -z "$VER" ]; then
            echo "ERROR: instrumentation_agent and new_agent_version are required"
            exit 1
          fi
          echo "instrumentation_agent=$CAT" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Get ro token
        id: sts
        uses: odigos-io/ci-core/sts@main
        with:
          scope: ${{ github.repository }}
          identity: ro

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.sts.outputs.GH_TOKEN }}

      - name: Update agent version and open PR
        uses: odigos-io/ci-core/apply-agent-version-update@main
        with:
          instrumentation_agent: ${{ steps.in.outputs.instrumentation_agent }}
          version: ${{ steps.in.outputs.version }}
          make_dir: odiglet
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
