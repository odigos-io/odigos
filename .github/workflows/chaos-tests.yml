name: Run chaos tests

on:
  workflow_call: # Workflow trigger
  workflow_dispatch: # Manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  build-images:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/build-dev-images.yml

  test:
    runs-on: warp-ubuntu-latest-x64-8x-spot
    needs:
      - build-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061717858829:role/ecr-pull-push-role
          aws-region: us-east-1

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.12

      - name: Create Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          node_image: 'kindest/node:v1.32.0@sha256:2458b423d635d7b01637cac2d6de7e1c1dca1148a2ba2e90975e214ca849e7cb'
          version: 'v0.25.0'
          cluster_name: kind-test-cluster
          config: tests/common/apply/kind-config.yaml

      - name: Build Odigos CLI
        uses: ./.github/actions/build/cli

      - name: Run Chaos Tests
        run: |
          export COMMIT_HASH=${{ github.sha }}
          chainsaw test tests/chaos/network-latency/leader-election
