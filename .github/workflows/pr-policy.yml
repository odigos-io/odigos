name: PR Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    
permissions:
  pull-requests: read
  statuses: write

jobs:
  require-linear:
    if: ${{ !startsWith(github.head_ref, 'pre-releases') }}
    runs-on: ubuntu-latest
    steps: 
      - uses: odigos-io/ci-core/require-linear@main

  release-note:
    if: ${{ !startsWith(github.head_ref, 'pre-releases') }}
    runs-on: ubuntu-latest
    steps: 
      - uses: odigos-io/ci-core/require-release-note@main
