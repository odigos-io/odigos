issuer: https://token.actions.githubusercontent.com
subject_pattern: >-
  repo:odigos-io/(opentelemetry-node|opentelemetry-ruby|opentelemetry-php):ref:(
    refs/tags/.*
    |refs/heads/main
    |refs/heads/releases/v[0-9]+\.[0-9]+\.x$
  )

permissions:

  # needed to trigger repository_dispatch event
  contents: write
