exporters:
  otlp/odigos-own-telemetry-ui:
    endpoint: ui.odigos-system:4317
    retry_on_failure:
      enabled: false
    tls:
      insecure: true
  otlp/out-cluster-collector-logs:
    balancer_name: round_robin
    compression: none
    endpoint: dns:///odigos-gateway.odigos-system:4317
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 5m
      max_interval: 30s
    tls:
      insecure: true
  otlp/out-cluster-collector-metrics:
    balancer_name: round_robin
    compression: none
    endpoint: dns:///odigos-gateway.odigos-system:4317
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 5m
      max_interval: 30s
    tls:
      insecure: true
  otlp/out-cluster-collector-profiles:
    balancer_name: round_robin
    compression: none
    endpoint: dns:///odigos-gateway.odigos-system:4317
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 5m
      max_interval: 30s
    tls:
      insecure: true
  otlp/out-cluster-collector-traces:
    balancer_name: round_robin
    compression: none
    endpoint: dns:///odigos-gateway.odigos-system:4317
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 5m
      max_interval: 30s
    tls:
      insecure: true
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
processors:
  batch: {}
  k8sattributes/profiles:
    auth_type: serviceAccount
    extract:
      labels:
      - key: app.kubernetes.io/name
        tag_name: service.name
      - key: app
        tag_name: service.name
      metadata:
      - k8s.pod.name
      - k8s.namespace.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.node.name
      - k8s.container.name
      - container.id
    filter:
      node_from_env_var: NODE_NAME
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: container.id
    - sources:
      - from: connection
  memory_limiter:
    check_interval: 500ms
    limit_mib: 0
    spike_limit_mib: 0
  odigoslogsresourceattrsprocessor: {}
  odigostrafficmetrics:
    res_attributes_keys:
    - service.name
    - k8s.namespace.name
    - k8s.deployment.name
    - k8s.statefulset.name
    - k8s.daemonset.name
    - k8s.cronjob.name
    - k8s.argoproj.rollout.name
    - odigos.workload.kind
    - odigos.workload.name
  resource/node-name:
    attributes:
    - action: upsert
      key: k8s.node.name
      value: ${NODE_NAME}
  resource/odigos-collector-role:
    attributes:
    - action: upsert
      key: odigos.collector.role
      value: NODE_COLLECTOR
  resource/pod-name:
    attributes:
    - action: upsert
      key: k8s.pod.name
      value: ${POD_NAME}
  resource/profiles-service-name:
    attributes:
    - action: insert
      from_attribute: k8s.deployment.name
      key: service.name
    - action: insert
      from_attribute: k8s.statefulset.name
      key: service.name
    - action: insert
      from_attribute: k8s.daemonset.name
      key: service.name
  resourcedetection:
    detectors:
    - ec2
    - eks
    - azure
    - aks
    timeout: 2s
  test_type/test_processor:
    key: val
receivers:
  odigosebpf: {}
  otlp/in:
    protocols:
      grpc:
        drop_on_overload: true
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  profiling: {}
  prometheus/self-metrics-ui:
    config:
      scrape_configs:
      - job_name: otelcol
        metric_relabel_configs:
        - action: keep
          regex: (.*odigos.*)
          source_labels:
          - __name__
        scrape_interval: 10s
        static_configs:
        - targets:
          - 127.0.0.1:55682
service:
  extensions:
  - health_check
  - pprof
  pipelines:
    metrics/own-metrics-ui:
      exporters:
      - otlp/odigos-own-telemetry-ui
      processors:
      - resource/pod-name
      - resource/odigos-collector-role
      receivers:
      - prometheus/self-metrics-ui
    profiles:
      exporters:
      - otlp/out-cluster-collector-profiles
      processors:
      - memory_limiter
      - resource/node-name
      - resourcedetection
      - k8sattributes/profiles
      - resource/profiles-service-name
      receivers:
      - profiling
      - otlp/in
    traces:
      exporters:
      - otlp/out-cluster-collector-traces
      processors:
      - batch
      - memory_limiter
      - resource/node-name
      - resourcedetection
      - test_type/test_processor
      - odigostrafficmetrics
      receivers:
      - otlp/in
      - odigosebpf
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      readers:
      - pull:
          exporter:
            prometheus:
              host: 0.0.0.0
              port: 55682
    resource:
      k8s.node.name: ${NODE_NAME}
      k8s.pod.name: ${POD_NAME}
      service.name: null
      service.version: null
