receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        keepalive:
          server_parameters:
            max_connection_age: 15s
            max_connection_age_grace: 2s
        max_recv_msg_size_mib: 128
      http:
        endpoint: 0.0.0.0:4318
exporters:
  debug/dummy:
    sampling_initial: 1
    sampling_thereafter: 1
    verbosity: basic
processors:
  batch/generic-batch-processor: {}
  resource/dummy-processor: {}
  resource/odigos-version:
    attributes:
    - action: upsert
      key: odigos.version
      value: ${ODIGOS_VERSION}
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
connectors:
  forward/logs/debug-dummy: {}
  odigosrouterconnector/logs: {}
service:
  extensions:
  - health_check
  - pprof
  pipelines:
    logs/debug-dummy:
      receivers:
      - forward/logs/debug-dummy
      processors:
      - batch/generic-batch-processor
      exporters:
      - debug/dummy
    logs/dummy-group:
      receivers:
      - odigosrouterconnector/logs
      processors:
      - batch/generic-batch-processor
      exporters:
      - forward/logs/debug-dummy
    logs/in:
      receivers:
      - otlp
      processors:
      - resource/odigos-version
      - resource/dummy-processor
      exporters:
      - odigosrouterconnector/logs
  telemetry:
    metrics:
      level: ""
      readers: []
    logs:
      level: ""
    resource: {}
