apiVersion: internal.odigos.io/v1beta1
kind: Configuration
metadata:
  name: rollout
  displayName: Rollout & Rollback
spec:
  fields:
    - displayName: Automatic Rollout Disabled
      componentType: toggle
      isHelmOnly: false
      description: When set to true, Odigos will never trigger a rollout for workloads when instrumenting or uninstrumenting.
      helmValuePath: rollout.automaticRolloutDisabled
      docsLink: https://docs.odigos.io/setup/odigos-with-helm/configuration/#
    - displayName: Max Concurrent Rollouts
      componentType: input
      isHelmOnly: false
      description: The maximum number of concurrent rollouts allowed. 0 is unlimited, disabling the limit.
      helmValuePath: rollout.maxConcurrentRollouts
      docsLink: https://docs.odigos.io/setup/odigos-with-helm/configuration/#
      componentProps:
        type: number
    - displayName: Rollback Disabled
      componentType: toggle
      isHelmOnly: false
      description: Disable automatic rollback when instrumentation causes issues.
      helmValuePath: rollbackDisabled
    - displayName: Rollback Grace Time
      componentType: input
      isHelmOnly: false
      description: Duration to wait before triggering a rollback (e.g. 30s, 5m).
      helmValuePath: rollbackGraceTime
    - displayName: Rollback Stability Window
      componentType: input
      isHelmOnly: false
      description: Duration the workload must be stable before considering rollback complete (e.g. 2m, 10m).
      helmValuePath: rollbackStabilityWindow
