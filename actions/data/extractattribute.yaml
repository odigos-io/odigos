apiVersion: internal.odigos.io/v1beta1
kind: Action
metadata:
  type: ExtractAttribute
  displayName: Extract Attribute
spec:
  description: Extract values from existing attributes and save them as new attributes using JSON, SQL, resource-path, or custom regex extraction.
  signals:
    traces:
      supported: true
    metrics:
      supported: false
    logs:
      supported: false
    profiles:
      supported: false
  docsEndpoint: /pipeline/actions/attributes/extractattribute
  docsDescription: Extracts a value from an existing span attribute into a new attribute on the same span. The value can be located by combining a lookup key with a pre-set data format (JSON, SQL, or resource path), or by supplying a custom regular expression that uses a single capture group.
  fields:
    - name: extractAttribute
      displayName: Extractions
      componentType: multiTabledInput
      componentProps:
        # The persisted config wraps the rows under `extractions`, so the dynamic
        # renderer serializes the table rows as `{ extractions: [...] }`.
        wrapKey: extractions
        tooltip: Extract a value from an existing attribute into a new attribute.
        columns:
          - keyName: lookupKey
            label: Lookup key
            placeholder: e.g. http.url
          - keyName: dataFormat
            label: Format
            componentType: dropdown
            options:
              - json
              - sql
              - resource_path
          - keyName: regex
            label: Regex
            placeholder: optional custom regex
          - keyName: targetAttributeName
            label: Target attribute
            placeholder: new attribute name
