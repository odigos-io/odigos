apiVersion: internal.odigos.io/v1beta1
kind: Action
metadata:
  type: K8sAttributesResolver
  displayName: Kubernetes Attributes
spec:
  docsUrl: https://docs.odigos.io/pipeline/actions/attributes/k8sattributes
  description: This action adds kubernetes related resource attributes to spans, metrics data points and log records.
  signals:
    traces:
      supported: true
    metrics:
      supported: true
    logs:
      supported: true
    profiles:
      supported: true
  fields:
    - name: k8sCollectAttributes
      displayName: Attributes to collect
      componentType: checkboxList
      # Every collect flag defaults on, matching the previous bespoke form so the
      # action isn't a no-op out of the box. `flatFields` writes each option id as
      # its own top-level boolean field, keeping the persisted shape flat
      # (collectContainerAttributes, collectReplicaSetAttributes, collectWorkloadId, collectClusterId).
      initialValue: '{"collectContainerAttributes":true,"collectReplicaSetAttributes":true,"collectWorkloadId":true,"collectClusterId":true}'
      componentProps:
        valueMode: flatFields
        options:
          - id: collectContainerAttributes
            label: Collect Container Attributes
            tooltip: Collect container related attributes (e.g. container name, image).
          - id: collectReplicaSetAttributes
            label: Collect ReplicaSet Attributes
            tooltip: Collect ReplicaSet related attributes.
          - id: collectWorkloadId
            label: Collect Workload UID
            tooltip: Collect the workload UID attribute.
          - id: collectClusterId
            label: Collect Cluster UID
            tooltip: Collect the cluster UID attribute.
