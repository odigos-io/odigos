apiVersion: internal.odigos.io/v1beta1
kind: Action
metadata:
  type: DbQueryTemplatization
  displayName: DB Query Templatization
spec:
  docsUrl: https://docs.odigos.io/pipeline/actions/attributes/dbquerytemplatization
  description: Templatizes database query text by replacing number and string literals with placeholders (e.g. SELECT * FROM users WHERE id = 1 -> SELECT * FROM users WHERE id = ?), reducing cardinality of query attributes and span names.
  signals:
    traces:
      supported: true
  fields:
    - name: scopes
      displayName: Source Scope
      componentType: sourceScopes
      componentProps:
        tooltip: Limit this action to specific workloads, namespaces, or programming languages. Leave empty to apply to all sources.
    - name: templatizeLiterals
      displayName: Templatize Literals
      componentType: toggle
      componentProps:
        tooltip: When enabled, number and string literals in SQL queries are replaced with placeholders. Identifiers, bind/positional parameters, booleans, and NULL are left unchanged.
