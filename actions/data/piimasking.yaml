apiVersion: internal.odigos.io/v1beta1
kind: Action
metadata:
  type: PiiMasking
  displayName: PII Masking
spec:
  docsUrl: https://docs.odigos.io/pipeline/actions/attributes/piimasking
  description: This action processes a list of PII categories to be masked from the traces.
  signals:
    traces:
      supported: true
    metrics:
      supported: false
    logs:
      supported: false
    profiles:
      supported: false
  fields:
    - name: piiCategories
      displayName: Attributes to mask
      componentType: checkboxList
      # Pre-select Credit card to match the previous bespoke form. `array` mode
      # stores the checked option ids as a string[] (the persisted piiCategories shape).
      initialValue: '["CREDIT_CARD"]'
      componentProps:
        valueMode: array
        tooltip: Select the PII categories to mask.
        options:
          - id: CREDIT_CARD
            label: Credit card
          - id: EMAIL
            label: Email
          - id: JWT
            label: JWT
          - id: UUID
            label: UUID
