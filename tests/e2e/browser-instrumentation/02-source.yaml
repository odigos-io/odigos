apiVersion: odigos.io/v1alpha1
kind: Source
metadata:
  name: frontend-source
  namespace: browser-demo
spec:
  workload:
    name: frontend
    namespace: browser-demo
    kind: Deployment
  # Browser instrumentation is opt-in: explicitly select the browser distribution on the serving
  # container. Odigos then injects the odigos-browser-proxy sidecar instead of an in-pod agent.
  containerOverrides:
    - containerName: frontend
      otelDistroName: browser-community
