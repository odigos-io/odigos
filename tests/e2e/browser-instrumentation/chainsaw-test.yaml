apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: browser-instrumentation
spec:
  description: >
    Validates that opting a front-end workload into the browser-community distribution causes the
    odigos-browser-proxy sidecar and the iptables-redirect init container to be injected into the
    workload's pods.

    NOTE: This scenario is intentionally not part of the default e2e matrix in .github/workflows/e2e.yaml.
    It requires the odigos-browser-proxy image to be built and loaded into the cluster
    (make build-browser-proxy load-to-kind-browser-proxy). Add it to the matrix to run it in CI.
  skipDelete: true
  steps:
    - name: Install Odigos
      try:
        - script:
            content: |
              if [ "$MODE" = "cross-cloud-tests" ]; then
                ../../../cli/odigos install --ns odigos-test --set image.tag="$COMMIT_HASH" --set imagePrefix=public.ecr.aws/y2v0v6s7
              else
                ../../../cli/odigos install --ns odigos-test --set image.tag=e2e-test
              fi
              kubectl label namespace odigos-test odigos.io/system-object="true"
              ../../common/verify_odigos_installation.sh odigos-test
            timeout: 4m
        - assert:
            timeout: 3m
            file: ../../common/assert/odigos-installed.yaml
    - name: Deploy front-end workload
      try:
        - apply:
            file: 01-frontend.yaml
    - name: Opt the front-end into browser instrumentation
      try:
        - apply:
            file: 02-source.yaml
    - name: Browser-proxy sidecar + init container are injected
      try:
        - assert:
            timeout: 3m
            file: 03-assert-sidecar-injected.yaml
