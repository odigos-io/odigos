# Runtime Detection Assertions
# This file asserts that runtime detection works correctly for different languages and versions

# Node.js Runtime Detection
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-unsupported-version
  namespace: default
  ownerReferences:
    - apiVersion: apps/v1
      blockOwnerDeletion: true
      controller: true
      kind: Deployment
      name: nodejs-unsupported-version
status:
  runtimeDetailsByContainer:
    - containerName: nodejs-unsupported-version
      language: javascript
      runtimeVersion: 8.17.0
      secureExecutionMode: false
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-very-old-version
  namespace: default
  ownerReferences:
    - apiVersion: apps/v1
      blockOwnerDeletion: true
      controller: true
      kind: Deployment
      name: nodejs-very-old-version
status:
  runtimeDetailsByContainer:
    - containerName: nodejs-very-old-version
      language: javascript
      (runtimeVersion == null): true
      secureExecutionMode: false
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-minimum-version
  namespace: default
  ownerReferences:
    - apiVersion: apps/v1
      blockOwnerDeletion: true
      controller: true
      kind: Deployment
      name: nodejs-minimum-version
status:
  runtimeDetailsByContainer:
    - containerName: nodejs-minimum-version
      language: javascript
      runtimeVersion: 14.0.0
      secureExecutionMode: false
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-latest-version
  namespace: default
  ownerReferences:
    - apiVersion: apps/v1
      blockOwnerDeletion: true
      controller: true
      kind: Deployment
      name: nodejs-latest-version
status:
  runtimeDetailsByContainer:
    - containerName: nodejs-latest-version
      language: javascript
      (runtimeVersion != null): true
      secureExecutionMode: false
---
