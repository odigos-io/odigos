apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: url-templatization
spec:
  description: E2E test for URL templatization; asserts templated http.route in simple-trace-db.
  skipDelete: true
  steps:
    - name: Prepare destination
      try:
        - apply:
            file: ../../common/apply/simple-trace-db-deployment.yaml

    - name: Install Test App
      try:
        - apply:
            file: install-test-apps.yaml

    - name: Install Odigos
      try:
        - script:
            content: |
              ../../../cli/odigos install --ns odigos-test --set image.tag=e2e-test
              ../../common/verify_odigos_installation.sh odigos-test
              kubectl label namespace odigos-test odigos.io/system-object="true"
            timeout: 4m
        - assert:
            timeout: 3m
            file: ../../common/assert/odigos-installed.yaml

    - name: Assert Trace DB is up
      try:
        - assert:
            timeout: 1m
            file: ../../common/assert/simple-trace-db-running.yaml

    - name: Assert App installed
      try:
        - assert:
            timeout: 5m
            file: assert-app-ready.yaml

    - name: Instrument default namespace
      try:
        - apply:
            file: ../../common/apply/instrument-default-ns.yaml

    - name: Add Destination
      try:
        - apply:
            file: ../../common/apply/add-simple-trace-db-destination.yaml

    - name: Apply URL templatization Action
      try:
        - apply:
            file: url-templatization-action.yaml

    - name: Assert Pipeline
      try:
        - assert:
            timeout: 1m
            file: ../../common/assert/pipeline-ready.yaml

    - name: Assert Deployments Ready
      try:
        - assert:
            timeout: 3m
            file: assert-app-ready.yaml

    - name: Assert at least one templated trace
      try:
        - script:
            timeout: 3m
            content: |
              while true; do
                ../../common/simple_trace_db_query_runner.sh assert-templated-traces.yaml
                if [ $? -eq 0 ]; then
                  break
                fi
                sleep 2
              done

    - name: Assert templation per rule (group 1 + group 2)
      try:
        - script:
            timeout: 2m
            content: |
              for f in assert-route-api-users-id.yaml assert-route-api-items.yaml assert-route-orders.yaml assert-route-tenants-resources.yaml; do
                ../../common/simple_trace_db_query_runner.sh "$f"
              done
