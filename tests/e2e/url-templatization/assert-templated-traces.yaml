apiVersion: e2e.tests.odigos.io/v1
kind: TraceTest
description: At least one url-demo-app span with templated http.route
query: |
  length([?span.serviceName == 'url-demo-app' && (
    span.spanAttributes."http.route" == '/api/users/{id}' ||
    span.spanAttributes."http.route" == '/api/items/{itemId}' ||
    span.spanAttributes."http.route" == '/api/users/{userId}/orders/{orderId}' ||
    span.spanAttributes."http.route" == '/v1/tenants/{tenantId}/resources/{resourceId}'
  )]) > `0`
expected:
  minimum: 1
