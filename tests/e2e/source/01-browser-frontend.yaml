# Minimal nginx front-end used to exercise browser-community sidecar injection
# alongside the existing simple-demo workloads in this e2e scenario.
apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-frontend-html
  namespace: default
data:
  index.html: |
    <!doctype html>
    <html>
      <head>
        <title>Odigos Browser Demo</title>
      </head>
      <body>
        <h1>Odigos Browser Instrumentation Demo</h1>
        <button id="ping" onclick="fetch('/').then(() => console.log('pinged'))">Ping</button>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-frontend
  template:
    metadata:
      labels:
        app: browser-frontend
    spec:
      containers:
        - name: browser-frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: browser-frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: browser-frontend
  namespace: default
spec:
  selector:
    app: browser-frontend
  ports:
    - port: 80
      targetPort: 80
