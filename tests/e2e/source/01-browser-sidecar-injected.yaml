# Asserts that the webhook injected the browser-proxy sidecar and the iptables redirect init
# container into the browser-frontend pod.
apiVersion: v1
kind: Pod
metadata:
  namespace: default
  labels:
    app: browser-frontend
spec:
  initContainers:
    - name: odigos-browser-proxy-init
      args:
        - init
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
  containers:
    - name: odigos-browser-proxy
      ports:
        - containerPort: 15001
      securityContext:
        runAsUser: 1337
