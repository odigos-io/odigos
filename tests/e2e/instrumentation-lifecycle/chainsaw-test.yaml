apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: instrumentation-lifecycle
spec:
  description: |
    This e2e test verifies the instrumentation device injection and instance lifecycle management.
    It tests that supported workloads get properly instrumented and that the instrumentation
    instances are created with correct health status.
  skipDelete: true
  steps:
    - name: Prepare destination
      try:
        - apply:
            file: ../../common/apply/simple-trace-db-deployment.yaml

    - name: Install Odigos
      try:
        - script:
            content: |
              ../../../cli/odigos install --namespace odigos-test --version e2e-test
              ../../common/verify_odigos_installation.sh odigos-test
            timeout: 4m
        - assert:
            timeout: 3m
            file: ../../common/assert/odigos-installed.yaml

    - name: Verify Node Odiglet label has been added
      try:
        - assert:
            file: ../../common/assert/node-odiglet-label.yaml

    - name: Assert Trace DB is up
      try:
        - assert:
            timeout: 1m
            file: ../../common/assert/simple-trace-db-running.yaml

    - name: Install Test Apps
      try:
        - apply:
            file: 01-install-test-apps.yaml

    - name: Assert Apps installed
      try:
        - assert:
            timeout: 150s
            file: ../../common/assert/instrumentation-apps-ready.yaml

    - name: Instrument Namespaces
      try:
        - apply:
            file: ../../common/apply/instrument-default-ns.yaml

    - name: Add Destination
      try:
        - apply:
            file: ../../common/apply/add-simple-trace-db-destination.yaml

    - name: Assert Pipeline
      try:
        - assert:
            timeout: 1m
            file: ../../common/assert/pipeline-ready.yaml

    - name: Assert Instrumentation Lifecycle
      try:
        - assert:
            timeout: 3m
            file: 01-assert-instrumented.yaml

    - name: Assert Workload State Changes
      try:
        - assert:
            timeout: 2m
            file: 01-assert-workloads.yaml

    - name: Verify Gunicorn Instrumentation Instances
      try:
        - script:
            timeout: 2m
            content: |
              set -e

              echo "=== Checking Gunicorn Instrumentation Instances ==="

              # The original test expected 6 gunicorn instrumentation instances
              EXPECTED_COUNT=6
              ACTUAL_COUNT=$(kubectl get instrumentationinstance | grep gunicorn | wc -l)

              if [ "$ACTUAL_COUNT" -eq "$EXPECTED_COUNT" ]; then
                echo "✅ Found $EXPECTED_COUNT gunicorn instrumentation instances."
                exit 0
              else
                echo "❌ Expected $EXPECTED_COUNT gunicorn instances, but found $ACTUAL_COUNT."
                kubectl get instrumentationinstance | grep gunicorn || true
                exit 1
              fi

    - name: Verify Instrumentation Instances Created
      try:
        - script:
            timeout: 2m
            content: |
              set -e

              echo "=== Checking Instrumentation Instances ==="

              # Check that instrumentation instances are created for supported workloads
              EXPECTED_INSTANCES=("nodejs-minimum-version" "nodejs-latest-version" "java-supported-version" "python-latest-version")

              for instance in "${EXPECTED_INSTANCES[@]}"; do
                echo "Checking instrumentation instance for $instance..."
                if kubectl get instrumentationinstance -l app="$instance" --no-headers | wc -l | grep -q "1"; then
                  echo "✅ Found instrumentation instance for $instance"
                else
                  echo "❌ Missing instrumentation instance for $instance"
                  kubectl get instrumentationinstance -l app="$instance" || true
                  exit 1
                fi
              done

              echo "✅ All expected instrumentation instances found"

    - name: Verify Workload Rollout Completed
      try:
        - script:
            timeout: 3m
            content: |
              set -e

              echo "=== Waiting for workload rollouts to complete ==="

              DEPLOYMENTS=("nodejs-minimum-version" "nodejs-latest-version" "java-supported-version" "python-latest-version")

              for deployment in "${DEPLOYMENTS[@]}"; do
                echo "Waiting for deployment $deployment to finish rollout..."
                kubectl rollout status deployment/$deployment -n default --timeout=120s
                if [ $? -ne 0 ]; then
                  echo "❌ Deployment $deployment failed to finish rollout"
                  exit 1
                fi
                echo "✅ Deployment $deployment rollout completed"
              done

              echo "✅ All workload rollouts completed successfully"
