# Workload Assertions - verifies deployment state changes after instrumentation
# This checks that workloads that should be instrumented have their deployment revision incremented

# nodejs-unsupported-version should NOT be restarted (unsupported version)
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: '1'
  generation: 1
  labels:
    app: nodejs-unsupported-version
  name: nodejs-unsupported-version
  namespace: default
spec:
  selector:
    matchLabels:
      app: nodejs-unsupported-version
status:
  availableReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
  updatedReplicas: 1
---
# nodejs-minimum-version should be restarted (supported version)
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: '2' # deployment spec changed when odigos resource was added
  generation: 2 # deployment spec changed when odigos resource was added
  labels:
    app: nodejs-minimum-version
  name: nodejs-minimum-version
  namespace: default
spec:
  selector:
    matchLabels:
      app: nodejs-minimum-version
status:
  availableReplicas: 1
  observedGeneration: 2 # deployment spec changed when odigos resource was added
  readyReplicas: 1
  replicas: 1
  updatedReplicas: 1
