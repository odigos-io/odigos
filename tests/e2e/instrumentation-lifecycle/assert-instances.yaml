# Instrumentation Instance Assertions
# Verifies that instrumentation instances are created for the 4 test workloads

apiVersion: odigos.io/v1alpha1
kind: InstrumentationInstance
metadata:
  namespace: default
  labels:
    instrumented-app: deployment-nodejs-minimum-version
status:
  healthy: true
  (identifyingAttributes[?key == 'telemetry.sdk.language']):
    - value: nodejs
  (identifyingAttributes[?key == 'process.runtime.version']):
    - (value != null): true
  (identifyingAttributes[?key == 'telemetry.distro.version']):
    - (value != null): true
  (identifyingAttributes[?key == 'process.vpid']):
    - (value != null): true
  (identifyingAttributes[?key == 'service.instance.id']):
    - (value != null): true
  (identifyingAttributes[?key == 'k8s.namespace.name']):
    - (value != null): true
  (identifyingAttributes[?key == 'k8s.pod.name']):
    - (value != null): true
  (identifyingAttributes[?key == 'k8s.container.name']):
    - (value != null): true
---
