# Rate Limited Rollouts Complete Assertions
# Verifies that all deployments have completed their rollouts after rate-limited re-instrumentation
# Also verifies the InstrumentationConfig WorkloadRollout condition shows success
# Note: We don't check exact revision numbers as race conditions in status updates can cause extra rollouts

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-minimum-version
  namespace: default
status:
  replicas: 1
  updatedReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-latest-version
  namespace: default
status:
  replicas: 1
  updatedReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-supported-version
  namespace: default
status:
  replicas: 1
  updatedReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-latest-version
  namespace: default
status:
  replicas: 1
  updatedReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-minimum-version
  namespace: default
status:
  conditions:
    - message: "workload marked for automatic instrumentation by namespace source CR 'default' in namespace 'default'"
      reason: NamespaceSource
      status: "True"
      type: MarkedForInstrumentation
    - message: "runtime detection completed successfully"
      reason: DetectedSuccessfully
      status: "True"
      type: RuntimeDetection
    - message: "agent enabled in 1 containers: [nodejs-minimum-version]"
      reason: EnabledSuccessfully
      status: "True"
      type: AgentEnabled
    - message: workload rollout triggered successfully
      reason: RolloutTriggeredSuccessfully
      status: "True"
      type: WorkloadRollout
---
apiVersion: odigos.io/v1alpha1
kind: InstrumentationConfig
metadata:
  name: deployment-nodejs-latest-version
  namespace: default
status:
  conditions:
    - message: "workload marked for automatic instrumentation by namespace source CR 'default' in namespace 'default'"
      reason: NamespaceSource
      status: "True"
      type: MarkedForInstrumentation
    - message: "runtime detection completed successfully"
      reason: DetectedSuccessfully
      status: "True"
      type: RuntimeDetection
    - message: "agent enabled in 1 containers: [nodejs-latest-version]"
      reason: EnabledSuccessfully
      status: "True"
      type: AgentEnabled
    - message: workload rollout triggered successfully
      reason: RolloutTriggeredSuccessfully
      status: "True"
      type: WorkloadRollout
---
